name: build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  source-and-build:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Enforce source-only boundary
        shell: pwsh
        run: ./scripts/Test-SourceBoundary.ps1

      - name: Restore, build, and test
        shell: pwsh
        run: ./scripts/Build.ps1

      - name: Create framework-dependent packages
        shell: pwsh
        run: ./scripts/Publish.ps1

      - name: Upload connector
        uses: actions/upload-artifact@v4
        with:
          name: KartRider-P236-Connector-win-x64
          path: artifacts/publish/connector
          if-no-files-found: error

      - name: Upload server
        uses: actions/upload-artifact@v4
        with:
          name: KartRider-P236-Server-win-x64
          path: artifacts/publish/server
          if-no-files-found: error
